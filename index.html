<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Tickets, SLA y Operación</title>

    <!-- ╔══════════════════════════════════════════════════════════╗
         ║  INRED — Premium Brand Preloader                        ║
         ║  Inline so it renders before any JS bundle loads.       ║
         ╚══════════════════════════════════════════════════════════╝ -->
    <style>
      /* ── Reset for preloader element only ──────────────────── */
      #inred-preloader *,
      #inred-preloader *::before,
      #inred-preloader *::after { box-sizing: border-box; }

      /* ── Overlay ────────────────────────────────────────────── */
      #inred-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafafa;
        overflow: hidden;
        /* Exit transition */
        transition: opacity 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                    visibility 0s linear 0.65s;
      }
      /* ── Shimmer sweep — pure translateX, always on compositor ─ */
      @keyframes inredShimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(340%); }
      }
      #inred-preloader::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 35%; height: 100%;
        background: linear-gradient(
          108deg,
          transparent 0%,
          rgba(255,255,255,0.00) 38%,
          rgba(255,255,255,0.06) 50%,
          rgba(255,255,255,0.00) 62%,
          transparent 100%
        );
        will-change: transform;
        animation: inredShimmer 3.4s 0.9s ease-in-out infinite;
        pointer-events: none;
      }
      /* ── Glow pulse — orange dot color ────────────────────── */
      @keyframes inredLogoGlow {
        0%, 100% { filter: drop-shadow(0 2px  8px rgba(194,119,58,0.00)); }
        50%       { filter: drop-shadow(0 8px 32px rgba(194,119,58,0.24)); }
      }
      .inred-pl-logo {
        animation: inredLogoGlow 2.6s 0.8s ease-in-out infinite;
      }
      /* ── Inner wrapper — holds logo + tagline, exit zoom target ─ */
      .inred-pl-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                    filter   0.65s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #inred-preloader.is-leaving {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #inred-preloader.is-leaving .inred-pl-inner {
        transform: scale(1.06);
        filter: blur(8px);
      }

      /* ── Logo sizing — responsive, crisp on retina ──────────── */
      .inred-pl-logo {
        width: clamp(220px, 50vw, 380px);
        height: auto;
        overflow: visible;
        display: block;
        will-change: transform;
      }

      /* ── Per-group base state ───────────────────────────────── */
      #g-i, #g-dot, #g-n, #g-r, #g-e, #g-d {
        opacity: 0;
        transform-box: fill-box;
      }
      /* Letters animate from bottom baseline */
      #g-i, #g-n, #g-r, #g-e, #g-d { transform-origin: 50% 100%; }
      /* Dot is independent — center origin */
      #g-dot { transform-origin: 50% 50%; }

      /* ── Reveal: pure translateY + opacity — compositor-safe ─── */
      @keyframes inredLetterReveal {
        0%   { opacity: 0; transform: translateY(28px); }
        38%  { opacity: 1; transform: translateY(-5px); }
        62%  { transform: translateY(2px); }
        82%  { transform: translateY(-1px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes inredDotReveal {
        0%   { opacity: 0; transform: translateY(-26px); }
        38%  { opacity: 1; transform: translateY(7px); }
        62%  { transform: translateY(-3px); }
        82%  { transform: translateY(1px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* ── Sustained breathe loop — pure translateY, compositor-only ── */
      @keyframes inredBreathe {
        0%, 100% { transform: translateY(0);    }
        50%       { transform: translateY(-8px); }
      }
      @keyframes inredBreatheDot {
        0%, 100% { transform: translateY(0);     }
        50%       { transform: translateY(-11px); }
      }

      /* ── GPU layer promotion ────────────────────────────────── */
      #g-i, #g-dot, #g-n, #g-r, #g-e, #g-d {
        will-change: transform, opacity;
      }

      /* ── Per-element timing — breathe after all reveals (>1.46s) ─ */
      #g-i   {
        animation:
          inredLetterReveal 0.96s 0s    cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreathe      2.6s  1.60s ease-in-out infinite;
      }
      #g-dot {
        animation:
          inredDotReveal    0.92s 0.07s cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreatheDot   2.6s  1.64s ease-in-out infinite;
      }
      #g-n   {
        animation:
          inredLetterReveal 0.96s 0.14s cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreathe      2.6s  1.73s ease-in-out infinite;
      }
      #g-r   {
        animation:
          inredLetterReveal 0.96s 0.26s cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreathe      2.6s  1.85s ease-in-out infinite;
      }
      #g-e   {
        animation:
          inredLetterReveal 0.96s 0.38s cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreathe      2.6s  1.97s ease-in-out infinite;
      }
      #g-d   {
        animation:
          inredLetterReveal 0.96s 0.50s cubic-bezier(0.34,1.56,0.64,1) both,
          inredBreathe      2.6s  2.09s ease-in-out infinite;
      }

      /* ── Tagline ─────────────────────────────────────────────── */
      @keyframes inredTaglineReveal {
        0%   { opacity: 0; transform: translateY(7px); }
        100% { opacity: 0.52; transform: translateY(0); }
      }
      .inred-pl-tagline {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(9px, 1.6vw, 12px);
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #27465D;
        opacity: 0;
        margin: 0;
        animation: inredTaglineReveal 0.7s 1.10s ease-out both;
      }

      /* ── Progress bar ───────────────────────────────────────── */
      @keyframes inredBarAuto {
        0%   { width: 0%; }
        100% { width: 72%; }
      }
      #inred-progress-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: rgba(39,70,93,0.07);
      }
      #inred-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #27465D 0%, #3F6F8C 45%, #C2773A 100%);
        border-radius: 0 2px 2px 0;
        will-change: width;
        animation: inredBarAuto 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        transition: width 0.45s ease-out;
      }
    </style>
  </head>

    <!-- ── Preloader dismissal controller ───────────────────────
         Waits for both:
           1. window load event (scripts parsed)
           2. window.__preloaderReady() call from App.jsx (data loaded)
         Plus a 2.8s minimum display window for the animation.
    ──────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        var SHOW_MIN = 2800;
        var t0 = performance.now();
        var dataReady = false;
        var loadReady = false;

        function leave() {
          var el = document.getElementById('inred-preloader');
          if (!el || el.classList.contains('is-leaving')) return;
          /* Snap bar to 100 %, then exit */
          var bar = document.getElementById('inred-progress-bar');
          var delay = 0;
          if (bar) {
            var bw = bar.getBoundingClientRect().width;
            var pw = bar.parentElement ? bar.parentElement.getBoundingClientRect().width : 1;
            bar.style.animation = 'none';
            bar.style.width = (pw > 0 ? (bw / pw * 100) : 0).toFixed(1) + '%';
            bar.offsetWidth; /* force reflow */
            bar.style.transition = 'width 0.40s ease-out';
            bar.style.width = '100%';
            delay = 430;
          }
          setTimeout(function () {
            el.classList.add('is-leaving');
            setTimeout(function () { el.remove(); }, 700);
          }, delay);
        }

        function tryLeave() {
          if (!dataReady || !loadReady) return;
          var elapsed = performance.now() - t0;
          setTimeout(leave, Math.max(0, SHOW_MIN - elapsed));
        }

        /* Called by App.jsx when JSON data has finished loading */
        window.__preloaderReady = function () {
          dataReady = true;
          tryLeave();
        };

        if (document.readyState === 'complete') {
          loadReady = true;
        } else {
          window.addEventListener('load', function () {
            loadReady = true;
            tryLeave();
          }, { once: true });
        }

        /* Safety fallback: dismiss after 7s regardless */
        setTimeout(function () {
          dataReady = true;
          loadReady = true;
          tryLeave();
        }, 7000);
      }());
    </script>
